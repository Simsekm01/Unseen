<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1800" viewBox="0 0 1200 1800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e9dcc0"/>
      <stop offset="0.45" stop-color="#dcc9a4"/>
      <stop offset="1" stop-color="#c9b487"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.7" cy="0.25" r="0.6">
      <stop offset="0" stop-color="#f6e7c4" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#f6e7c4" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="softer"><feGaussianBlur stdDeviation="16"/></filter>
  </defs>

  <rect width="1200" height="1800" fill="url(#sky)"/>
  <rect width="1200" height="1800" fill="url(#sun)"/>

  <!-- ferne Baumreihe -->
  <g filter="url(#softer)" opacity="0.55">
    <ellipse cx="150" cy="780" rx="220" ry="180" fill="#7c7a48"/>
    <ellipse cx="1050" cy="760" rx="260" ry="200" fill="#6f7642"/>
    <ellipse cx="600" cy="720" rx="320" ry="180" fill="#8a7d44"/>
  </g>

  <!-- Wiese -->
  <path d="M0 980 Q600 900 1200 980 L1200 1800 L0 1800 Z" fill="#9aa05c" opacity="0.5" filter="url(#soft)"/>
  <path d="M0 1180 Q600 1110 1200 1180 L1200 1800 L0 1800 Z" fill="#6f7a44" opacity="0.55" filter="url(#soft)"/>

  <!-- Andeutung Lusthaus: gruener Pavillon mit Kuppel & Saeulen -->
  <g opacity="0.5" filter="url(#soft)" transform="translate(600 700)">
    <ellipse cx="0" cy="-40" rx="150" ry="70" fill="#4f6240"/>
    <path d="M-150 -40 Q0 -200 150 -40 Z" fill="#5d7049"/>
    <rect x="-150" y="-40" width="300" height="20" fill="#3f5234"/>
    <g fill="#cdbf9b">
      <rect x="-135" y="-20" width="20" height="170"/>
      <rect x="-80" y="-20" width="20" height="170"/>
      <rect x="-10" y="-20" width="20" height="170"/>
      <rect x="60" y="-20" width="20" height="170"/>
      <rect x="115" y="-20" width="20" height="170"/>
    </g>
    <rect x="-150" y="150" width="300" height="26" fill="#3f5234"/>
  </g>

  <!-- nahe Blaetter / Herbstzweige -->
  <g opacity="0.6" filter="url(#soft)">
    <path d="M0 1500 q120 -180 60 -360 q120 140 40 320 q140 -120 120 -300 q60 220 -40 360 Z" fill="#8a5a2c"/>
    <path d="M1200 1480 q-140 -200 -60 -380 q-120 130 -50 330 q-150 -110 -130 -300 q-50 230 60 360 Z" fill="#7a6a30"/>
  </g>

  <rect width="1200" height="1800" fill="#e7dcc4" opacity="0.18"/>
</svg>
